name: Build Android APK New
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build workspace packages
        run: yarn build:snjs

      - name: Generate self-signed keystore
        run: |
          keytool -genkeypair \
            -alias mykey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=Dev, OU=Dev, O=Dev, L=Dev, S=Dev, C=US"

      - name: Make gradlew executable
        run: chmod +x packages/mobile/android/gradlew

      - name: Build release APK
        run: |
          cd packages/mobile/android
          ./gradlew assembleRelease --warning-mode=none \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=password123 \
            -Pandroid.injected.signing.key.alias=mykey \
            -Pandroid.injected.signing.key.password=password123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: standardnotes-release
          path: packages/mobile/android/**/*.apk
